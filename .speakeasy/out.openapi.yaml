ions"}]}},"InvalidWorkerCountType":{"value":{"errors":[{"code":"VALIDATION_ERROR","message":"worker_count must be an integer"}]}},"InvalidControlPlaneCountType":{"summary":"Control plane count is not an integer","value":{"errors":[{"code":"VALIDATION_ERROR","message":"control_plane_count must be an integer"}]}}},"schema":{"$ref":"#/components/schemas/error_object"}}}},"403":{"description":"Forbidden","content":{"application/vnd.api+json":{"examples":{"InsufficientPermissions":{"value":{"errors":[{"code":"FORBIDDEN","message":"You don't have permission to perform this action"}]}}},"schema":{"$ref":"#/components/schemas/error_object"}}}},"404":{"description":"Not Found","content":{"application/vnd.api+json":{"examples":{"ClusterNotFound":{"value":{"errors":[{"code":"NOT_FOUND","message":"Cluster my-cluster not found"}]}}},"schema":{"$ref":"#/components/schemas/error_object"}}}},"422":{"description":"Unprocessable Entity","content":{"application/vnd.api+json":{"examples":{"ClusterNotReady":{"value":{"errors":[{"code":"VALIDATION_ERROR","message":"Cluster must be in Provisioned phase to accept updates (current phase: Provisioning)"}]}},"InvalidWorkerCount":{"value":{"errors":[{"code":"INVALID_WORKER_COUNT","message":"worker_count must be between 0 and 10"}]}},"WorkerPlanRequired":{"value":{"errors":[{"code":"WORKER_PLAN_REQUIRED","message":"worker_plan is required when scaling from 0 workers"}]}},"InvalidControlPlaneCount":{"summary":"Control plane count below minimum","value":{"errors":[{"code":"VALIDATION_ERROR","message":"control_plane_count must be at least 1"}]}},"InsufficientStock":{"value":{"errors":[{"code":"INSUFFICIENT_STOCK","message":"No stock available of plan suitable for Kubernetes cluster"}]}},"VersionDowngrade":{"summary":"Attempted to downgrade Kubernetes version","value":{"errors":[{"code":"VERSION_DOWNGRADE","message":"Cannot downgrade from v1.35.0+rke2r1 to v1.34.0+rke2r1"}]}},"MinorVersionSkip":{"summary":"Attempted to skip a minor version","value":{"errors":[{"code":"MINOR_VERSION_SKIP","message":"Cannot skip minor versions. Current: 1.34, target: 1.36. Upgrade to 1.35 first."}]}},"VersionNotAvailable":{"summary":"Target version not in available versions list","value":{"errors":[{"code":"VERSION_NOT_AVAILABLE","message":"Version v1.30.0+rke2r1 is not available for upgrade"}]}}},"schema":{"$ref":"#/components/schemas/error_object"}}}},"503":{"description":"Service Unavailable","content":{"application/vnd.api+json":{"examples":{"ManagementClusterError":{"value":{"errors":[{"code":"MANAGEMENT_CLUSTER_ERROR","message":"Failed to communicate with the management cluster"}]}}},"schema":{"$ref":"#/components/schemas/error_object"}}}}},"requestBody":{"content":{"application/vnd.api+json":{"schema":{"$ref":"#/components/schemas/update_kubernetes_cluster"},"examples":{"ScaleWorkersUp":{"summary":"Scale workers from 2 to 5","value":{"data":{"type":"kubernetes_clusters","attributes":{"worker_count":5}}}},"ScaleWorkersDown":{"summary":"Scale workers from 5 to 2","value":{"data":{"type":"kubernetes_clusters","attributes":{"worker_count":2}}}},"ScaleWorkersFromZero":{"summary":"Scale from 0 workers (requires worker_plan)","value":{"data":{"type":"kubernetes_clusters","attributes":{"worker_count":3,"worker_plan":"c3-small-x86"}}}},"ScaleWorkersToZero":{"summary":"Scale down to 0 workers","value":{"data":{"type":"kubernetes_clusters","attributes":{"worker_count":0}}}},"ScaleControlPlaneUp":{"summary":"Scale control plane from 1 to 3 nodes","value":{"data":{"type":"kubernetes_clusters","attributes":{"control_plane_count":3}}}},"ScaleControlPlaneDown":{"summary":"Scale control plane from 3 to 1 node","value":{"data":{"type":"kubernetes_clusters","attributes":{"control_plane_count":1}}}},"UpgradeVersion":{"summary":"Upgrade Kubernetes version","value":{"data":{"type":"kubernetes_clusters","attributes":{"kubernetes_version":"v1.35.0+rke2r1"}}}}}}},"required":true}}},
