
name = "latitudesh-mcp-server"
# Manual override (re-apply after `speakeasy run`): point at the hand-written
# OAuth wrapper, not the generated entrypoint. The wrapper re-uses the generated
# LatitudeshMCP Durable Object and adds OAuth + the cli_sessions login bridge.
main = "src/cloudflare-worker/oauth-entry.ts"
compatibility_date = "2025-07-15"

# Enable node compatibility for MCP SDK
compatibility_flags = ["nodejs_compat"]

# Custom domain (Workers Custom Domain — auto-manages DNS + TLS on the latitude.sh zone).
# NOTE: not generated by Speakeasy — re-add after any `speakeasy run` regen.
routes = [
  { pattern = "mcp.latitude.sh", custom_domain = true }
]

# Durable Object binding for MCP Agent
[[durable_objects.bindings]]
name = "LATITUDESH_MCP"
class_name = "LatitudeshMCP"

# KV for workers-oauth-provider (tokens/grants/clients) + the login-bridge state.
# Manual addition — not generated by Speakeasy.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "2c85f823a5c648558928e37c92553661"

# Durable Object migration
# NOTE: McpAgent (agents SDK) requires a SQLite-backed Durable Object, so this
# uses `new_sqlite_classes`. Speakeasy regenerates this file with `new_classes`
# (KV backend), which breaks /mcp at runtime — re-apply this after `speakeasy run`.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["LatitudeshMCP"]

# Static assets configuration
[assets]
directory = "./static"
binding = "ASSETS"
run_worker_first = true

# Development configuration
[dev]
port = 8787