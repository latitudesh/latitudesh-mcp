name: Generate
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  workflow_dispatch:
    inputs:
      force:
        description: Force generation of SDKs
        type: boolean
        default: false
      set_version:
        description: optionally set a specific SDK version
        type: string
  schedule:
    - cron: 0 0 * * *
  pull_request:
    types:
      - labeled
      - unlabeled
jobs:
  generate:
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      force: ${{ github.event.inputs.force }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version }}
    secrets:
      github_access_token: ${{ secrets.GITHUB_TOKEN }}
      npm_token: ${{ secrets.NPM_TOKEN }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}

  # Re-apply the Cloudflare/OAuth overrides that `speakeasy run` clobbers, then
  # push them onto the same regen branch so the PR is mergeable as-is. Runs in
  # the same workflow run as `generate` (a push from the bot's GITHUB_TOKEN would
  # NOT trigger a standalone workflow). Fails loudly if the override script can't
  # find its anchors — a Speakeasy template change then blocks the merge instead
  # of silently shipping a broken worker.
  reapply-overrides:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      # The reusable generate workflow does not expose its branch name to callers,
      # so find the open regen PR's head branch via the API. Empty if no regen PR
      # was opened this run (e.g. no spec changes) — later steps then skip.
      - name: Find regen branch
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 50 \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("speakeasy-sdk-regen"))] | sort_by(.number) | last | .headRefName // ""')
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "Regen branch: ${branch:-<none>}"
      - uses: actions/checkout@v4
        if: steps.find.outputs.branch != ''
        with:
          ref: ${{ steps.find.outputs.branch }}
      - uses: oven-sh/setup-bun@v2
        if: steps.find.outputs.branch != ''
      - name: Re-apply Cloudflare/OAuth overrides
        if: steps.find.outputs.branch != ''
        run: node scripts/apply-cloudflare-overrides.mjs
      - name: Build (repopulate manifest.json + tool-names.ts, typecheck)
        if: steps.find.outputs.branch != ''
        run: bun run build
      - name: Commit & push to the regen branch
        if: steps.find.outputs.branch != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No override changes to push (already applied)."
          else
            git commit -m "ci: re-apply Cloudflare/OAuth overrides after regen"
            git push origin HEAD:${{ steps.find.outputs.branch }}
          fi
